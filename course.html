<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Курс</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      .course-modules {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .module-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .module-card h2 {
        margin: 0 0 12px 0;
        font-size: 18px;
        color: #333;
      }
      .module-card h3 {
        margin: 16px 0 8px 0;
        font-size: 16px;
        color: #555;
      }
      .module-card p {
        margin: 8px 0;
        line-height: 1.6;
        color: #444;
      }
      .module-card ul, .module-card ol {
        margin: 8px 0;
        padding-left: 20px;
      }
      .module-card li {
        margin: 4px 0;
        line-height: 1.5;
        color: #444;
      }
      .module-card pre {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 13px;
        line-height: 1.4;
        color: #333;
        margin: 12px 0;
      }
      .module-card code {
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
      .module-card blockquote {
        background: #e8f4ff;
        border-left: 4px solid #2196F3;
        margin: 12px 0;
        padding: 12px 16px;
        border-radius: 0 8px 8px 0;
        color: #333;
      }
      .module-card table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 14px;
      }
      .module-card th, .module-card td {
        border: 1px solid #ddd;
        padding: 8px 12px;
        text-align: left;
      }
      .module-card th {
        background: #f5f5f5;
        font-weight: 600;
      }
      .module-card a {
        color: #2196F3;
        text-decoration: none;
      }
      .module-card a:hover {
        text-decoration: underline;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }
      .progress-indicator {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .progress-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ddd;
        cursor: pointer;
        transition: all 0.2s;
      }
      .progress-dot:hover {
        background: #bbb;
      }
      .progress-dot.active {
        background: #2196F3;
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <a class="back-link" href="index.html">← На главную</a>
      <h1 id="course-title">Загрузка...</h1>
      <div class="progress-indicator" id="progress-indicators"></div>
      <section class="course-modules" id="course-modules">
        <p class="loading">Загрузка материалов курса...</p>
      </section>
    </main>

    <script>
      const API_URL = "http://localhost:4000";
      
      async function loadCourse() {
        const params = new URLSearchParams(window.location.search);
        const courseId = params.get("course");
        const titleEl = document.getElementById("course-title");
        const modulesEl = document.getElementById("course-modules");
        const progressEl = document.getElementById("progress-indicators");
        
        if (!courseId) {
          titleEl.textContent = "Курс не найден";
          modulesEl.innerHTML = "<p>Укажите ID курса в URL.</p>";
          return;
        }

        try {
          const [coursesRes, modulesRes] = await Promise.all([
            fetch(`${API_URL}/courses`),
            fetch(`${API_URL}/courses/${courseId}/modules`)
          ]);

          const courses = await coursesRes.json();
          const modules = await modulesRes.json();
          
          const course = courses.find(c => c.id === parseInt(courseId));
          
          if (!course) {
            titleEl.textContent = "Курс не найден";
            modulesEl.innerHTML = "<p>Такой курс не существует.</p>";
            return;
          }

          titleEl.textContent = course.title;
          
          progressEl.innerHTML = modules.map((_, i) => 
            `<div class="progress-dot ${i === 0 ? 'active' : ''}" data-index="${i}" title="Модуль ${i + 1}"></div>`
          ).join('');

          const dots = progressEl.querySelectorAll('.progress-dot');
          dots.forEach(dot => {
            dot.addEventListener('click', () => {
              const index = parseInt(dot.dataset.index);
              const target = modulesEl.querySelectorAll('.module-card')[index];
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            });
          });

          modulesEl.innerHTML = modules.map((module, index) => `
            <div class="module-card" id="module-${index}">
              ${module.content}
            </div>
          `).join('');

          const cards = modulesEl.querySelectorAll('.module-card');
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                const index = Array.from(cards).indexOf(entry.target);
                dots.forEach((d, i) => {
                  d.classList.toggle('active', i === index);
                });
              }
            });
          }, { threshold: 0.3 });

          cards.forEach(card => observer.observe(card));

        } catch (error) {
          console.error('Error loading course:', error);
          titleEl.textContent = "Ошибка загрузки";
          modulesEl.innerHTML = "<p>Не удалось загрузить курс. Попробуйте позже.</p>";
        }
      }

      loadCourse();

      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    </script>
  </body>
</html>
