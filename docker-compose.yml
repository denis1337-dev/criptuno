version: "3.9"

services:
  db:
    image: postgres:16
    container_name: tg-miniapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgminiapp
      POSTGRES_USER: tgminiapp
      POSTGRES_PASSWORD: tgminiapp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
